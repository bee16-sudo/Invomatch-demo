services:
  - type: web
    name: invomatch-api
    env: python
    pythonVersion: "3.11.9"
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: invomatch-db
          property: connectionString
      - key: PYTHONPATH
        value: ./backend
      - key: ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11.9"

databases:
  - name: invomatch-db
    databaseName: invo_match
    user: invo_match
    plan: free
